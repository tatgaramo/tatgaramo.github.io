<h1>{{ page.title }}</h1>
<p>{{ page.description }}</p>

<h2>Proyectos relacionados</h2>
<ul>
{% for project in site.projects %}
{% if project.title in page.projects %}
    <li>
        <a href="{{ project.url }}">
            <img src="{{ project.image }}" alt="{{ project.title }}" width="200">
            <p>{{ project.title }}</p>
        </a>
        <p>{{ project.description }}</p>
    </li>
{% endif %}
{% endfor %}
</ul>
