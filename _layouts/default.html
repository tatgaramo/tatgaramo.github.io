<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  {% seo %}
</head>
<body>
  <header class="page-header">
    <h1 class="project-name">{{ site.title }}</h1>
    <h2 class="project-tagline">{{ site.description }}</h2>
    <nav>
      <a href="{{ "/" | relative_url }}" class="btn">Inicio</a>
      <a href="{{ "/about" | relative_url }}" class="btn">Sobre mí</a>
    </nav>
  </header>

  <main class="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <span class="site-footer-credits">
      © {{ site.time | date: "%Y" }} {{ site.title }} | 
      <a href="https://github.com/{{ site.social.github }}">GitHub</a> | 
      <a href="https://linkedin.com/in/{{ site.social.linkedin }}">LinkedIn</a>
       <br>
    <small>
      <a href="https://icons8.com/icon/12345/nombre-del-icono" target="_blank" rel="noopener noreferrer">Icono</a> por 
      <a href="https://icons8.com" target="_blank" rel="noopener noreferrer">Icons8</a>
    </small>
    </span>
  </footer>
</body>
</html>
