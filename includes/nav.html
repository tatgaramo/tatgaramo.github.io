<nav class="navbar">
  <div class="container">
    {% for link in site.navbar_links %}
      <a href="{{ link.url | relative_url }}" 
         class="navbar-link {% if page.url == link.url %}active{% endif %}">
        {{ link.name }}
      </a>
    {% endfor %}
  </div>
</nav>

<style>
  .navbar {
    background: #2c3e50;
    padding: 1rem 0;
  }
  .navbar-link {
    color: white;
    text-decoration: none;
    margin: 0 1rem;
    font-weight: bold;
  }
  .navbar-link:hover {
    color: #3498db;
  }
  .navbar-link.active {
    border-bottom: 2px solid #3498db;
  }
</style>
