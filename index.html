---
layout: default
title: "Mi Portafolio - Inicio"
---
<!-- Contenido específico de la página de inicio -->
<section class="hero">
    <div class="container">
        <h1>¡Hola, soy {{ site.author | default: "Tatiana Garijo Amorós" }}!</h1>
        <p class="subtitle">{{ site.description | default: "Bienvenido a mi portafolio" }}</p>
        <img src="{{ '/assets/img/profile.jpg' | relative_url }}" alt="Mi foto" class="profile-image">
    </div>
</section>

<section class="skills">
    <h2>Mis habilidades</h2>
    <div class="skills-grid">
        {% for skill in site.skills %}
        <div class="skill-card">
            <img src="{{ skill.icon | relative_url }}" alt="{{ skill.name }}">
            <h3>{{ skill.name }}</h3>
        </div>
        {% endfor %}
    </div>
</section>
